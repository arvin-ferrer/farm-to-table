name: Auto Request Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  request-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request teammates as reviewers
        uses: actions/github-script@v6
        with:
          script: |
            // List of all your team members' GitHub usernames
            const allMembers = ['arvin-ferrer', 'eagarduce', 'Natex15', 'sutobuto'];

            // GitHub doesn't let you review your own PR, so we filter out the person who opened it
            const reviewersToRequest = allMembers.filter(member => member !== context.actor);

            if (reviewersToRequest.length > 0) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                reviewers: reviewersToRequest
              });
              console.log(`Requested reviews from: ${reviewersToRequest.join(', ')}`);
            }
